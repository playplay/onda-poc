    // ─── Engagement Classification ───────────────────────────────────
    function classifyEngagement(post) {
      const rate = post.engagementRate;
      const f = post.followers;
      if (f >= 100000) {
        if (rate > 2) return "Viral";
        if (rate >= 0.5) return "Engaging";
        return "Neutral";
      } else if (f >= 10000) {
        if (rate > 3) return "Viral";
        if (rate >= 1) return "Engaging";
        return "Neutral";
      } else {
        if (rate > 5) return "Viral";
        if (rate >= 2) return "Engaging";
        return "Neutral";
      }
    }

    // ─── Format colors (same as current PostCard FORMAT_COLORS) ─────
    const FORMAT_STYLES = {
      video:    { bg: "bg-purple-50", text: "text-purple-700", border: "border-purple-200", label: "Video" },
      carousel: { bg: "bg-blue-50",   text: "text-blue-700",   border: "border-blue-200",   label: "Carousel" },
      image:    { bg: "bg-orange-50", text: "text-orange-700", border: "border-orange-200", label: "Image" },
      text:     { bg: "bg-gray-50",   text: "text-gray-500",   border: "border-gray-200",   label: "Text" },
    };

    const ENGAGEMENT_STYLES = {
      Viral:    { dot: "bg-rose-800", text: "text-rose-800" },
      Engaging: { dot: "bg-blue-400", text: "text-blue-400" },
      Neutral:  { dot: "bg-gray-300", text: "text-gray-400" },
    };

    // ─── SVG Icons ──────────────────────────────────────────────────
    const ICONS = {
      linkedin: `<svg class="w-4 h-4 text-[#0A66C2]" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
      instagram: `<svg class="w-4 h-4 text-[#E4405F]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>`,
      person: `<svg class="w-3.5 h-3.5 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>`,
      building: `<svg class="w-3.5 h-3.5 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 01-1 1h-2a1 1 0 01-1-1v-2a1 1 0 00-1-1H9a1 1 0 00-1 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V4zm3 1h2v2H7V5zm2 4H7v2h2V9zm2-4h2v2h-2V5zm2 4h-2v2h2V9z" clip-rule="evenodd"/></svg>`,

      comment: `<svg class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>`,

    };

    // ─── Format number ──────────────────────────────────────────────
    function fmtNum(n) {
      if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k';
      return n.toString();
    }

    // ─── Render a single card ───────────────────────────────────────
    function renderCard(post) {
      const eng = classifyEngagement(post);
      const fmt = FORMAT_STYLES[post.format] || FORMAT_STYLES.text;
      const engStyle = ENGAGEMENT_STYLES[eng];
      const isPP = post.isPlayPlay;

      // Border: PlayPlay gets thin violet left border, others get format-colored border
      const borderClass = isPP
        ? `border ${fmt.border} border-l-[3px] border-l-violet-500`
        : `border ${fmt.border}`;

      // "PlayPlay Client" text below format+platform in header (right-aligned, subtle)
      const ppLabel = isPP
        ? `<span class="text-[10px] font-normal text-violet-400">PlayPlay Client</span>`
        : '';

      // Preview section (clean — no overlays except video play button)
      let preview = '';
      if (post.image) {
        const videoOverlay = post.hasVideo
          ? `<div class="absolute inset-0 flex items-center justify-center bg-black/20">
               <div class="w-12 h-12 rounded-full bg-black/60 flex items-center justify-center backdrop-blur-sm">
                 ${ICONS.play}
               </div>
             </div>`
          : '';
        preview = `
          <div class="aspect-[4/3] overflow-hidden relative bg-gray-50">
            <img src="${post.image}" alt="" loading="lazy" class="w-full h-full object-cover" />
            ${videoOverlay}
          </div>`;
      } else if (post.hasVideo) {
        preview = `
          <div class="aspect-[4/3] overflow-hidden relative bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center">
            <div class="w-14 h-14 rounded-full bg-white/10 flex items-center justify-center border border-white/20">
              ${ICONS.play}
            </div>
          </div>`;
      } else {
        preview = `
          <div class="aspect-[4/3] overflow-hidden relative bg-gray-50 flex items-start p-5">
            <p class="text-sm text-gray-500 leading-relaxed line-clamp-6">${post.textContent || 'No content'}</p>
          </div>`;
      }

      return `
        <a href="#" class="block bg-white ${borderClass} rounded-xl shadow-sm hover:shadow-md transition-shadow overflow-hidden">
          <!-- Header: account info + format pill + platform icon -->
          <div class="px-4 pt-3 pb-2">
            <div class="flex items-center justify-between gap-2">
              <div class="flex items-center gap-1.5 min-w-0">
                ${post.type === "person" ? ICONS.person : ICONS.building}
                <span class="text-sm font-semibold text-gray-900 truncate">${post.author}</span>
              </div>
              <div class="flex items-center gap-1.5 shrink-0">
                <span class="text-[11px] px-2 py-0.5 rounded-full font-medium ${fmt.bg} ${fmt.text}">${fmt.label}</span>
                ${post.platform === "instagram" ? ICONS.instagram : ICONS.linkedin}
              </div>
            </div>
            <div class="flex items-center justify-between mt-0.5">
              <p class="text-[11px] text-gray-400 truncate">${post.sector} · ${post.useCase}</p>
              ${ppLabel}
            </div>
          </div>

          <!-- Preview -->
          ${preview}

          <!-- Footer: engagement metrics -->
          <div class="px-4 py-3">
            <div class="flex items-center gap-4 text-xs text-gray-500">
              <span class="flex items-center gap-1">
                ${ICONS.thumbsUp}
                ${fmtNum(post.reactions)}
              </span>
              <span class="flex items-center gap-1">
                ${ICONS.comment}
                ${fmtNum(post.comments)}
              </span>
              <span class="flex items-center gap-1 ml-auto ${engStyle.text}">
                <span class="w-1.5 h-1.5 rounded-full ${engStyle.dot}"></span>
                ${eng}
              </span>
            </div>
          </div>
        </a>`;
    }

    // ─── Render ─────────────────────────────────────────────────────
    function render() {
      const sorted = [...POSTS].sort((a, b) => b.engagementRate - a.engagementRate);
      document.getElementById('content').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
          ${sorted.map(renderCard).join('')}
        </div>`;
      document.getElementById('post-count').textContent = `${POSTS.length} posts`;
    }

    // ─── Init ───────────────────────────────────────────────────────
    render();
  </script>
